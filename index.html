<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamza Shoaib</title>
    <style>
        :root {
            color-scheme: dark; /* Ensures browser native elements are dark-themed */
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #09090b; /* Dark background matching the widget */
            color: #e2e8f0; /* Light text */
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Prevents scrolling on the profile card */
        }

        .profile-card {
            background: #18181b; /* Slightly lighter dark for the card */
            border: 1px solid rgba(255, 255, 255, 0.08); /* Subtle border */
            border-radius: 20px;
            padding: 40px;
            width: 320px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); /* Deep shadow for pop */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Subtle hover effect for the card */
        .profile-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .profile-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%; /* Makes the photo a perfect circle */
            object-fit: cover; /* Ensures the photo isn't stretched */
            border: 4px solid #3b82f6; /* Blue border matching your widget's accent */
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); /* Soft blue glow */
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.6rem;
            margin: 0 0 8px 0;
            color: #f8fafc;
        }

        .title {
            font-size: 0.95rem;
            color: #94a3b8; /* Muted gray for the subtitle */
            margin: 0 0 30px 0;
            font-weight: 400;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Styling for the buttons */
        .profile-link {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        /* Hover states for the buttons */
        .profile-link:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #f8fafc;
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Specific style for the primary link (Work Profile) */
        .profile-link.primary {
            background-color: #3b82f6;
            color: white;
            border: none;
        }

        .profile-link.primary:hover {
            background-color: #2563eb;
        }

        /* SVG Icons from your toolbar styles */
        .icon {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="image_75caeb.jpg" alt="Hamza Shoaib" class="profile-photo">
        
        <h1>Hamza Shoaib</h1>
        <p class="title">NERA Economic Consulting</p>
        
        <div class="links-container">
            <a href="https://www.nera.com/experts/s/hamza-shoaib.html?lang=en" target="_blank" class="profile-link primary">
                <svg class="icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                View NERA Expert Profile
            </a>
            
            <a href="https://www.linkedin.com/in/hamza-shoaib-878052107/" target="_blank" class="profile-link">
                <svg class="icon" viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
                Connect on LinkedIn
            </a>
        </div>
    </div>

</body>
</html>
