<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamza Shoaib</title>
    <style>
        :root {
            color-scheme: dark;
        }

        /* 1. Added universal box-sizing to prevent padding from breaking widths */
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #09090b;
            color: #e2e8f0;
            margin: 0;
            /* 2. Added padding so the card doesn't touch screen edges on narrow devices */
            padding: 20px; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-card {
            background: #18181b;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            /* 3. Changed fixed width to a fluid width with a max-width cap */
            width: 100%; 
            max-width: 360px; 
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .profile-photo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #3b82f6;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.6rem;
            margin: 0 0 8px 0;
            color: #f8fafc;
        }

        .title {
            font-size: 0.95rem;
            color: #94a3b8;
            margin: 0 0 30px 0;
            font-weight: 400;
        }

        .section-label {
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .links-container:last-child {
            margin-bottom: 0;
        }

        .profile-link {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .profile-link:hover {
            background-color: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Tool specific styling */
        .profile-link.tool {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            color: #60a5fa;
        }

        .profile-link.tool:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin-bottom: 24px;
        }

        .icon {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            /* 4. Ensures icons don't shrink inside flex containers */
            flex-shrink: 0; 
        }

        /* 5. Added a media query to shrink padding on tiny screens (like older iPhones) */
        @media (max-width: 400px) {
            .profile-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="image_75caeb.jpg" alt="Hamza Shoaib" class="profile-photo">
        
        <h1>Hamza Shoaib</h1>
        <p class="title">NERA Economic Consulting</p>
        
        <div class="section-label">Profiles</div>
        <div class="links-container">
            <a href="https://www.nera.com/experts/s/hamza-shoaib.html?lang=en" target="_blank" class="profile-link">
                <svg class="icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                NERA
            </a>
            
            <a href="https://www.linkedin.com/in/hamza-shoaib-878052107/" target="_blank" class="profile-link">
                <svg class="icon" viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
                LinkedIn
            </a>
        </div>

        <div class="divider"></div>

        <div class="section-label">Interactive Tools</div>
        <div class="links-container">
            <a href="https://hamzashoaib.com/local-market-simulator/" class="profile-link tool">
                <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                Local Market Simulator
            </a>
        </div>
    </div>

</body>
</html>
